name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            rust-targets: ""
          - platform: windows-latest
            args: ""
            rust-targets: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}

      # Collect all built files into a flat folder for upload
      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          find src-tauri/target -type f \( \
            -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" \
            -o -name "*.msi" -o -name "*.exe" -o -name "*.rpm" \
          \) -exec cp {} artifacts/ \;
          ls -la artifacts/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: unlavarel-${{ matrix.platform }}
          path: artifacts/*
          retention-days: 30

  # After all 3 platforms build, create/update the "latest" release
  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      # Download all artifacts from build jobs
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          merge-multiple: false

      # Flatten into one folder
      - name: Prepare release files
        run: |
          mkdir -p release
          find all-artifacts -type f \( \
            -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" \
            -o -name "*.msi" -o -name "*.exe" -o -name "*.rpm" \
          \) -exec cp {} release/ \;
          echo "Release files:"
          ls -lh release/

      # Delete old "latest" release + tag, then recreate
      - name: Update latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Unlavarel — Latest Build"
          body: |
            **Auto-updated on every push to main.**
            Last built: ${{ github.sha }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | macOS (universal) | `.dmg` |
            | Linux | `.AppImage` / `.deb` |
            | Windows | `.msi` / `.exe` |

            > ⚠️ macOS: first launch requires `xattr -rd com.apple.quarantine Unlavarel.app`
          draft: false
          prerelease: true
          make_latest: true
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Versioned release when you push a tag like v0.1.0
  versioned-release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          merge-multiple: false

      - name: Prepare release files
        run: |
          mkdir -p release
          find all-artifacts -type f \( \
            -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" \
            -o -name "*.msi" -o -name "*.exe" -o -name "*.rpm" \
          \) -exec cp {} release/ \;

      - name: Create versioned release
        uses: softprops/action-gh-release@v2
        with:
          name: "Unlavarel ${{ github.ref_name }}"
          body: |
            ## Unlavarel ${{ github.ref_name }}

            Cross-platform local development environment manager.

            ### Downloads
            | Platform | File |
            |----------|------|
            | macOS (universal) | `.dmg` |
            | Linux | `.AppImage` / `.deb` |
            | Windows | `.msi` / `.exe` |
          draft: false
          prerelease: false
          make_latest: true
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
