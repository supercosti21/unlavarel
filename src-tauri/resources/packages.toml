# MacEnv Package Registry
# Maps canonical package names to native package names per package manager.
# Pattern variables: {version}, {prefix}

[php]
description = "PHP interpreter and FPM"
category = "language"
has_service = true
versioned = true

[php.managers.homebrew]
pattern = "php@{version}"
service_name = "php@{version}"
tap = "shivammathur/php"
available_versions = ["8.1", "8.2", "8.3", "8.4"]
binary = "php"
binary_path_template = "{prefix}/opt/php@{version}/bin"
config_path_template = "{prefix}/etc/php/{version}"

[php.managers.apt]
pattern = "php{version}-fpm"
service_name = "php{version}-fpm"
ppa = "ondrej/php"
available_versions = ["8.1", "8.2", "8.3", "8.4"]
binary = "php{version}"
binary_path_template = "/usr/bin"
config_path_template = "/etc/php/{version}"
additional_packages = [
    "php{version}-cli",
    "php{version}-common",
    "php{version}-mysql",
    "php{version}-xml",
    "php{version}-curl",
    "php{version}-mbstring",
    "php{version}-zip",
    "php{version}-gd",
    "php{version}-bcmath",
]

[php.managers.pacman]
pattern = "php"
service_name = "php-fpm"
available_versions = ["latest"]
binary = "php"
binary_path_template = "/usr/bin"
config_path_template = "/etc/php"

[php.managers.winget]
pattern = "PHP.PHP.{version}"
available_versions = ["8.1", "8.2", "8.3", "8.4"]
binary = "php.exe"

# ── MySQL ──────────────────────────────────────────

[mysql]
description = "MySQL database server"
category = "database"
has_service = true
versioned = true

[mysql.managers.homebrew]
pattern = "mysql@{version}"
service_name = "mysql@{version}"
available_versions = ["8.0", "8.4"]
binary = "mysql"
binary_path_template = "{prefix}/opt/mysql@{version}/bin"
config_path_template = "{prefix}/etc/my.cnf"

[mysql.managers.apt]
pattern = "mysql-server"
service_name = "mysql"
available_versions = ["8.0"]
binary = "mysql"
binary_path_template = "/usr/bin"
config_path_template = "/etc/mysql"

[mysql.managers.pacman]
pattern = "mariadb"
service_name = "mariadb"
available_versions = ["latest"]
binary = "mysql"
binary_path_template = "/usr/bin"
config_path_template = "/etc/my.cnf.d"

